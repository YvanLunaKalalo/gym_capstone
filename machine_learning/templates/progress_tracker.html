{% extends 'master.html' %}

{% load static %}

{% block title %}
<title>Flex Appeal || Progress Tracker</title>
{% endblock %}

{% block content %}
    <h2>Your Workout Progress</h2>
    <ul>
        {% for progress in user_progress %}
            <li>{{ progress.workout.Title }} - {{ progress.progress }}% complete</li>
        {% endfor %}
    </ul>
{% endblock %}
