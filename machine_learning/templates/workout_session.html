{% extends 'master.html' %}

{% load static %}

{% block title %}
<title>Flex Appeal || Workout Session - {{ workout.Title }}</title>
{% endblock %}

{% block content %}
<div class="container">
    <h2 class="text-center">{{ workout.Title }}</h2>
    <h5 class="text-center">Time: <span id="timeDisplay">00:00</span></h5>

    <button id="startBtn" class="btn btn-success">Start</button>
    <button id="pauseBtn" class="btn btn-warning" style="display:none;">Pause</button>
    <button id="finishBtn" class="btn btn-danger" style="display:none;">Finish</button>
</div>

<script>
    let timer;
    let seconds = 0;
    let isRunning = false;

    document.getElementById('startBtn').addEventListener('click', function() {
        startTimer();
        fetch("{% url 'workout_session' workout.Title %}", {
            method: 'POST',
            body: new URLSearchParams({
                'action': 'start'
            }),
            headers: {
                'X-CSRFToken': '{{ csrf_token }}'
            }
        });
    });

    document.getElementById('pauseBtn').addEventListener('click', function() {
        pauseTimer();
        fetch("{% url 'workout_session' workout.Title %}", {
            method: 'POST',
            body: new URLSearchParams({
                'action': 'pause'
            }),
            headers: {
                'X-CSRFToken': '{{ csrf_token }}'
            }
        }).then(response => response.json()).then(data => {
            if (data.status === 'paused') {
                console.log('Paused at: ' + data.time);
            }
        });
    });

    document.getElementById('finishBtn').addEventListener('click', function() {
        stopTimer();
        fetch("{% url 'workout_session' workout.Title %}", {
            method: 'POST',
            body: new URLSearchParams({
                'action': 'finish'
            }),
            headers: {
                'X-CSRFToken': '{{ csrf_token }}'
            }
        });
    });

    function startTimer() {
        isRunning = true;
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('pauseBtn').style.display = 'inline-block';
        document.getElementById('finishBtn').style.display = 'inline-block';

        timer = setInterval(function() {
            seconds++;
            let minutes = Math.floor(seconds / 60);
            let remainingSeconds = seconds % 60;
            document.getElementById('timeDisplay').innerText = 
                String(minutes).padStart(2, '0') + ':' + String(remainingSeconds).padStart(2, '0');
        }, 1000);
    }

    function pauseTimer() {
        isRunning = false;
        clearInterval(timer);
        document.getElementById('startBtn').style.display = 'inline-block';
        document.getElementById('pauseBtn').style.display = 'none';
    }

    function stopTimer() {
        clearInterval(timer);
    }
</script>
{% endblock %}
