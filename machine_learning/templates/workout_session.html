{% extends 'master.html' %}

{% load static %}

{% block title %}
<title>Flex Appeal || Workout Session</title>
{% endblock %}

{% block content %}
<h1>Log Workout Session</h1>

<form method="POST">
    {% csrf_token %}
    <div>
        <label for="workout_id">Workout:</label>
        <select name="workout_id" id="workout_id">
            {% for workout in workouts %}
                <option value="{{ workout.id }}">{{ workout.Title }}</option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label for="estimated_time">Estimated Time (minutes):</label>
        <input type="number" name="estimated_time" id="estimated_time" required>
    </div>

    <div>
        <label for="actual_time">Actual Time (minutes):</label>
        <input type="number" name="actual_time" id="actual_time" required>
    </div>

    <button type="submit">Log Workout</button>
</form>
{% endblock %}
