{% extends 'master.html' %}

{% load static %}

{% block title %}
<title>Flex Appeal || Workout Session</title>
{% endblock %}

{% block content %}
    <h2>Workout Session: {{ workout.Title }}</h2>
    <p>{{ workout.Desc }}</p>
    <p>Duration: <span id="timer">00:00</span></p>
    
    <form method="POST" action="{% url 'complete_workout' session_id=session_id %}">
        {% csrf_token %}
        <button type="submit">Complete Workout</button>
    </form>

    <script>
        let timerElement = document.getElementById('timer');
        let startTime = Date.now();
        
        function updateTimer() {
            let timeSpent = Math.floor((Date.now() - startTime) / 1000); // seconds
            let minutes = Math.floor(timeSpent / 60);
            let seconds = timeSpent % 60;
            timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        setInterval(updateTimer, 1000); // Update every second
    </script>
{% endblock %}
